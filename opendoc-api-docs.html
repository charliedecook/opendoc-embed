<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenDoc Platform API — Developer Reference</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --green: #2D6A4F;
  --green-light: #D8F3DC;
  --green-dark: #1B4332;
  --green-muted: #40916C;
  --bg: #FAFAF8;
  --bg-card: #FFFFFF;
  --bg-code: #1E2A24;
  --bg-sidebar: #F2F1EE;
  --text: #1A1A1A;
  --text2: #555555;
  --text3: #888888;
  --border: #E4E2DE;
  --border-light: #EFEDE9;
  --method-get: #2D6A4F;
  --method-post: #2563EB;
  --method-patch: #D97706;
  --method-delete: #DC2626;
  --method-get-bg: #D8F3DC;
  --method-post-bg: #DBEAFE;
  --method-patch-bg: #FEF3C7;
  --method-delete-bg: #FEE2E2;
  --font-serif: 'Source Serif 4', Georgia, serif;
  --font-sans: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'Source Code Pro', monospace;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  width: 280px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  overflow-y: auto;
  z-index: 100;
  padding: 0 0 40px;
}

.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg-sidebar);
  z-index: 10;
}

.sidebar-logo {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: -0.3px;
}

.sidebar-logo span {
  font-weight: 400;
  color: var(--text2);
  font-size: 13px;
  margin-left: 6px;
  font-family: var(--font-sans);
}

.sidebar-search {
  margin-top: 12px;
  position: relative;
}

.sidebar-search input {
  width: 100%;
  padding: 8px 12px 8px 32px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-family: var(--font-sans);
  background: var(--bg-card);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.sidebar-search input:focus { border-color: var(--green); }

.sidebar-search::before {
  content: "⌕";
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
}

.nav-section {
  padding: 12px 0 4px;
}

.nav-section-title {
  padding: 6px 20px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 20px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
  border-left: 2px solid transparent;
}

.nav-item:hover {
  color: var(--text);
  background: rgba(0,0,0,0.03);
}

.nav-item.active {
  color: var(--green);
  border-left-color: var(--green);
  background: rgba(45,106,79,0.04);
  font-weight: 600;
}

.nav-method {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  padding: 1px 4px;
  border-radius: 3px;
  text-transform: uppercase;
  flex-shrink: 0;
  min-width: 36px;
  text-align: center;
}

.nav-method.GET { color: var(--method-get); background: var(--method-get-bg); }
.nav-method.POST { color: var(--method-post); background: var(--method-post-bg); }
.nav-method.PATCH { color: var(--method-patch); background: var(--method-patch-bg); }
.nav-method.DELETE { color: var(--method-delete); background: var(--method-delete-bg); }

.nav-path {
  font-family: var(--font-mono);
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Main ── */
.main {
  margin-left: 280px;
  flex: 1;
  max-width: 960px;
  padding: 40px 48px 120px;
}

/* ── Hero ── */
.hero {
  margin-bottom: 48px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}

.hero h1 {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 700;
  color: var(--green-dark);
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}

.hero .version {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--green-light);
  color: var(--green);
  padding: 2px 10px;
  border-radius: 10px;
  font-weight: 600;
  margin-bottom: 16px;
}

.hero-desc {
  font-size: 15px;
  color: var(--text2);
  line-height: 1.7;
  max-width: 680px;
}

.hero-desc p { margin-bottom: 12px; }

.hero-servers {
  margin-top: 20px;
  display: flex;
  gap: 12px;
}

.server-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
}

.server-badge code {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--green);
  font-weight: 500;
}

.server-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
}

.server-dot.sandbox { background: var(--method-patch); }

/* ── Invariant Banner ── */
.invariant-banner {
  background: var(--bg-code);
  color: #D8F3DC;
  padding: 20px 24px;
  border-radius: var(--radius);
  margin-bottom: 48px;
  font-size: 14px;
  line-height: 1.7;
  border-left: 4px solid var(--green);
}

.invariant-banner strong {
  color: #fff;
  font-weight: 700;
}

/* ── Section ── */
.section {
  margin-bottom: 48px;
  scroll-margin-top: 24px;
}

.section-title {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 700;
  color: var(--green-dark);
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}

.section-desc {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 24px;
  white-space: pre-line;
}

/* ── Endpoint Card ── */
.endpoint {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s;
  scroll-margin-top: 24px;
}

.endpoint:hover { box-shadow: var(--shadow-lg); }

.endpoint-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.endpoint-header:hover { background: rgba(0,0,0,0.01); }

.method-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  min-width: 52px;
  text-align: center;
  flex-shrink: 0;
}

.method-badge.GET { color: var(--method-get); background: var(--method-get-bg); }
.method-badge.POST { color: var(--method-post); background: var(--method-post-bg); }
.method-badge.PATCH { color: var(--method-patch); background: var(--method-patch-bg); }
.method-badge.DELETE { color: var(--method-delete); background: var(--method-delete-bg); }

.endpoint-path {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
}

.endpoint-path .param { color: var(--green-muted); }

.endpoint-summary {
  font-size: 13px;
  color: var(--text2);
  margin-left: auto;
  text-align: right;
  flex-shrink: 0;
  max-width: 260px;
}

.endpoint-chevron {
  color: var(--text3);
  transition: transform 0.2s;
  flex-shrink: 0;
  font-size: 12px;
}

.endpoint.open .endpoint-chevron { transform: rotate(90deg); }

.endpoint-body {
  display: none;
  padding: 0 20px 20px;
  border-top: 1px solid var(--border-light);
}

.endpoint.open .endpoint-body { display: block; }

.endpoint-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
  padding: 16px 0;
  white-space: pre-line;
}

.endpoint-desc strong { color: var(--text); font-weight: 600; }

/* ── Sub-sections in endpoint ── */
.sub-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  margin: 16px 0 8px;
}

/* ── Schema display ── */
.schema-block {
  background: var(--bg-code);
  border-radius: 6px;
  padding: 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.8;
  color: #C9D1D9;
  overflow-x: auto;
  margin: 8px 0;
}

.schema-block .key { color: #7EE787; }
.schema-block .type { color: #79C0FF; }
.schema-block .req { color: #FFA657; }
.schema-block .desc { color: #8B949E; font-style: italic; }
.schema-block .enum-val { color: #D2A8FF; }

/* ── Response codes ── */
.response-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
}

.response-row:last-child { border-bottom: none; }

.status-code {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  flex-shrink: 0;
  min-width: 40px;
  text-align: center;
}

.status-code.s2xx { color: var(--method-get); background: var(--method-get-bg); }
.status-code.s4xx { color: var(--method-delete); background: var(--method-delete-bg); }

/* ── Schema Reference Cards ── */
.schema-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  scroll-margin-top: 24px;
}

.schema-card-header {
  padding: 12px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.15s;
}

.schema-card-header:hover { background: rgba(0,0,0,0.01); }

.schema-name {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--green);
}

.schema-card-body {
  display: none;
  padding: 0 20px 16px;
  border-top: 1px solid var(--border-light);
}

.schema-card.open .schema-card-body { display: block; }

/* ── State Machine ── */
.state-machine {
  background: var(--bg-code);
  border-radius: 6px;
  padding: 16px 20px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 2;
  color: #C9D1D9;
  white-space: pre;
  overflow-x: auto;
  margin: 12px 0;
}

.state-machine .state { color: #7EE787; font-weight: 600; }
.state-machine .arrow { color: #FFA657; }
.state-machine .trigger { color: #8B949E; }

/* ── Stats bar ── */
.stats-bar {
  display: flex;
  gap: 24px;
  margin: 20px 0 32px;
  flex-wrap: wrap;
}

.stat {
  text-align: center;
}

.stat-num {
  font-family: var(--font-serif);
  font-size: 28px;
  font-weight: 700;
  color: var(--green);
}

.stat-label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── Auth badges ── */
.auth-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  background: #FEF3C7;
  color: #92400E;
  margin-left: 8px;
  vertical-align: middle;
}

/* ── Mobile ── */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 24px 20px 80px; }
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">OpenDoc <span>API v1.1</span></div>
    <div class="sidebar-search">
      <input type="text" id="search" placeholder="Search endpoints..." autocomplete="off">
    </div>
  </div>
  <div id="nav"></div>
</div>

<div class="main" id="main"></div>

token issued during client registration.  \nPatient-context endpoints require a patient session token obtained via \nOAuth 2.0 authorization code flow with PKCE.  \nProvider-context endpoints require a provider session token or platform \ndelegation token with provider authorization.\n\n## Standard Response Envelope\n\nEvery response includes the following top-level fields:\n- `request_id` (UUID) \u2014 unique per request\n- `api_version` \u2014 e.g. \"1.0\"\n- `schema_version` \u2014 e.g. \"1.0\"  \n- `timestamp` \u2014 ISO 8601\n\nThese are omitted from individual schema definitions for brevity but are \nalways present in the wire format.\n\n## Idempotency\n\nAll state-mutating operations (POST, PATCH, DELETE) accept an \n`Idempotency-Key` header (UUID). Duplicate requests with the same key \nreturn the original response without re-executing the operation.\n\n## Rate Limits\n\nLimits are per-client and per-patient. Tier 2/3 consent data access has \ndaily budgets to prevent slow exfiltration. Rate limit headers are returned \non every response: `X-RateLimit-Limit`, `X-RateLimit-Remaining`, `Retry-After`.\n\n## Banned Terminology\n\nPer the Anti-PRD, the following terms never appear in API responses:\n\"balance due\", \"final bill\", \"insurance price\", \"covered service\", \n\"approved\", \"denied\", \"HSA-eligible\", \"you owe\", \"pending adjudication\".\n", "contact": {"name": "OpenDoc Platform Team", "email": "platform@opendoc.com"}, "license": {"name": "Proprietary", "url": "https://opendoc.com/terms"}}, "servers": [{"url": "https://api.opendoc.com/v1", "description": "Production"}, {"url": "https://sandbox.api.opendoc.com/v1", "description": "Sandbox (test data, no real transactions)"}], "tag_groups": {"Taxonomy": {"description": "Canonical clinical and service taxonomies. Query symptoms, diagnoses, \nHSO scope vocabulary, and specialty classifications. These are the \nlookup tables that power resolve_to_care and membership scope definitions.\n", "endpoints ponses": {"200": {"description": "Provider's offers", "schema": {"$ref": "#/components/schemas/Offer_List"}}}}]}, "Offers": {"description": "An Offer is the binding of Provider \u00d7 HSO \u00d7 Location \u00d7 Cash Price. \nWrite access for providers. Read access for all authenticated clients.\n", "endpoints": [{"method": "POST", "path": "/offers", "operationId": "createOffer", "tags": ["Offers"], "summary": "Create an offer (bind provider to HSO at a price)", "description": "Creates an Offer: the binding of a provider to an HSO at a \nspecific location with a specific cash price. The price is \nimmutable once a Health Key references this offer.\n\nThe price must be the provider's real, deliverable cash price. \nPer the pricing guide: \"Does this price work even if insurance \npays nothing? If yes, you are ready to list.\"\n", "parameters": [], "security": [{"ProviderAuth": []}], "requestBody": {"required": true, "schema": {"$ref": "#/components/schemas/OfferCreate"}}, "responses": {"201": {"description": "Offer created", "schema": {"$ref": "#/components/schemas/Offer"}}, "400": {"description": "Validation failure. Common causes: provider not verified, \nHSO not in provider capabilities, location not registered.\n", "schema": {"$ref": "#/components/schemas/Error"}}}}, {"method": "GET", "path": "/offers/{offer_id}", "operationId": "getOffer", "tags": ["Offers"], "summary": "Get offer detail", "description": "", "parameters": [{"$ref": "#/components/parameters/OfferID"}], "security": [], "responses": {"200": {"description": "Offer detail", "schema": {"$ref": "#/components/schemas/Offer"}}}}, {"method": "PATCH", "path": "/offers/{offer_id}", "operationId": "updateOffer", "tags": ["Offers"], "summary": "Update offer price or availability", "description": "Update the cash price or availability for an offer. Price changes \napply prospectively only \u2014 any Health Key already referencing \nthis offer retains the price at time of creation.\n\n**Cash Price Invariant**: A xt` \nfield exists solely to help platform partners display comparative \ninformation in their own UIs (e.g. \"your HSA balance can cover \nthis\") \u2014 it does not affect pricing, ranking, or resolution.\n\n**Determinism guarantee**: Same inputs + same `policy_version` = \nsame ranked outputs.\n\n**Human confirmation constraint**: The response includes a \n`confirmation_url`. No third-party app may book, generate a \nbinding credential, or trigger payment without explicit patient \nconfirmation in the Health Key UI.\n", "parameters": [], "security": [], "requestBody": {"required": true, "schema": {"$ref": "#/components/schemas/ResolveRequest"}}, "responses": {"200": {"description": "Resolution result", "schema": {"$ref": "#/components/schemas/ResolveResponse"}}, "400": {"description": ""}, "403": {"description": "Consent required", "schema": {"$ref": "#/components/schemas/Error"}}, "429": {"description": ""}}}]}, "Patients": {"description": "Patient identity creation and management. Patients are created via \nOAuth-linked registration or platform-initiated enrollment.\n", "endpoints": [{"method": "POST", "path": "/patients", "operationId": "createPatient", "tags": ["Patients"], "summary": "Register a patient", "description": "Creates a patient identity on the platform. Can be initiated by:\n\n1. **Direct registration** \u2014 patient authenticates via OAuth and \n   a patient record is created from verified identity claims.\n2. **Platform-initiated** \u2014 a platform partner creates a patient \n   record during their own onboarding flow, linked to the \n   patient's identity via OAuth token exchange.\n\nThe patient_id is the durable identifier used across all \nsubsequent API calls. A patient must exist before a Health Key \ncan be created.\n", "parameters": [], "security": [], "requestBody": {"required": true, "schema": {"$ref": "#/components/schemas/PatientCreate"}}, "responses": {"201": {"description": "Patient created", "schema": {"$ref": "#/components/schemas/Patient"}}, "409": {"description": "Patient already exists (matched on identity claims)", "schema": {"$ref": "#/components/schemas/Error"}}}}, {"method": "GET", "path": "/patients/{patient_id}", "operationId": "getPatient", "tags": ["Patients"], "summary": "Get patient identity", "description": "Returns patient identity fields. Clinical data is NOT returned \nhere \u2014 that requires consent-gated access via separate endpoints.\n", "parameters": [{"$ref": "#/components/parameters/PatientID"}], "security": [], "responses": {"200": {"description": "Patient identity", "schema": {"$ref": "#/components/schemas/Patient"}}}}]}, "Health Keys": {"description": "The Health Key lifecycle \u2014 creation, authorization, state management, \nQR payload, scan verification. See State Transitions section.\n", "endpoints": [{"method": "GET", "path": "/health-keys", "operationId": "listHealthKeys", "tags": ["Health Keys"], "summary": "List Health Keys", "description": "Query Health Keys by patient, provider, state, or date range.\nPlatform partners see only Health Keys created through their \nintegration.\n", "parameters": [{"name": "patient_id", "in": "query", "schema": {"type": "string", "format": "uuid"}}, {"name": "provider_id", "in": "query", "schema": {"type": "string", "format": "uuid"}}, {"name": "state", "in": "query", "schema": {"type": "array", "items": {"$ref": "#/components/schemas/HealthKeyState"}}}, {"name": "created_after", "in": "query", "schema": {"type": "string", "format": "date-time"}}, {"name": "created_before", "in": "query", "schema": {"type": "string", "format": "date-time"}}, {"$ref": "#/components/parameters/PageCursor"}, {"$ref": "#/components/parameters/PageLimit"}], "security": [], "responses": {"200": {"description": "Health Key list", "schema": {"type": "object", "properties": {"data": {"type": "array", "items": {"$ref": "#/components/schemas/HealthKey"}}, "pagination": {"$ref": "#/components/schemas/Pagination"}}}}}}, {"method": "POST", "path": "/h ef": "#/components/schemas/HealthKey"}}, "409": {"description": "Cannot cancel in current state", "schema": {"$ref": "#/components/schemas/Error"}}}}, {"method": "GET", "path": "/health-keys/{health_key_id}/qr", "operationId": "getHealthKeyQR", "tags": ["Health Keys"], "summary": "Get the QR authority token", "description": "Returns the QR payload for scanning. No PHI in plaintext. \nThe signed token carries its own validity window for offline \nverification \u2014 scannable in clinic basements and OR environments.\n", "parameters": [{"$ref": "#/components/parameters/HealthKeyID"}, {"name": "format", "in": "query", "schema": {"type": "string", "enum": ["json", "png", "svg"], "default": "json"}}], "security": [], "responses": {"200": {"description": "QR payload or image", "schema": {"$ref": "#/components/schemas/QRPayload"}}}}, {"method": "POST", "path": "/scan", "operationId": "scanHealthKey", "tags": ["Health Keys"], "summary": "Scan and verify a Health Key QR", "description": "The boarding-pass scan. Resolves the full transaction: identity, \nprovider, HSO, state, bounds, funding. When this succeeds, \nnegotiation stops.\n\nSupports offline verification: if the signed token is within its \n`offline_valid_until` window and the signature is valid, returns \na VERIFIED result with `verification_mode: OFFLINE`.\n", "parameters": [], "security": [], "requestBody": {"required": true, "schema": {"type": "object", "required": ["qr_token"], "properties": {"qr_token": {"type": "string"}, "scanner_provider_id": {"type": "string", "format": "uuid"}}}}, "responses": {"200": {"description": "Health Key verified", "schema": {"$ref": "#/components/schemas/ScanResult"}}, "400": {"description": "Invalid or expired token", "schema": {"$ref": "#/components/schemas/Error"}}}}]}, "Memberships": {"description": "Membership HSO (mHSO) lifecycle. Provider-side tier management and \npatient-side enrollment, renewal, and cancellation.\n", "endpoints": [{"method": "GET", "path": "/membership-tiers", "operationId": "listMembershipTiers", "tags": ["Memberships"], "summary": "Search membership tiers", "description": "", "parameters": [{"name": "template", "in": "query", "schema": {"type": "string", "enum": ["DPC", "PSYCHIATRY", "MATERNITY", "CHRONIC_SPECIALTY", "CUSTOM"]}}, {"name": "geo", "in": "query", "schema": {"type": "string"}}, {"name": "radius_miles", "in": "query", "schema": {"type": "integer", "default": 25}}, {"name": "provider_id", "in": "query", "schema": {"type": "string", "format": "uuid"}}, {"name": "hsa_eligible", "in": "query", "schema": {"type": "boolean"}}, {"name": "capacity_state", "in": "query", "schema": {"type": "string", "enum": ["OPEN", "WAITLIST", "FULL"]}}, {"$ref": "#/components/parameters/PageCursor"}, {"$ref": "#/components/parameters/PageLimit"}], "security": [], "responses": {"200": {"description": "Membership tier list", "schema": {"$ref": "#/components/schemas/MembershipTier_List"}}}}, {"method": "POST", "path": "/membership-tiers", "operationId": "createMembershipTier", "tags": ["Memberships"], "summary": "Create a membership tier", "description": "Provider creates a new membership tier with structured scope, \npricing, capacity, and SLA definitions. Created in DRAFT state.\n\n**Validation enforced at creation:**\n- Required exclusions (EXCL.HOSPITAL.*, EXCL.ANES.GENERAL, \n  EXCL.IMAGING.ADVANCED) must be present. Fails without them.\n- HSA-eligible tiers enforce IRS 2026-05 fee caps ($150/mo \n  individual, $300/mo family) and prohibited inclusions.\n- Empty exclusion lists are rejected. This is a validation \n  failure, not a warning.\n", "parameters": [], "security": [{"ProviderAuth": []}], "requestBody": {"required": true, "schema": {"$ref": "#/components/schemas/MembershipTierCreate"}}, "responses": {"201": {"description": "Tier created (DRAFT)", "schema": {"$ref": "#/components/schemas/MembershipTier"}}, "400": {"description": "Validation failure. Check required_exclusions, fee caps \n(if HSA-eligible), and scop // ── Helpers ──
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatPath(p) {
  return escHtml(p).replace(/\{([^}]+)\}/g, '<span class="param">{$1}</span>');
}

function resolveRef(obj, root) {
  if (!obj) return obj;
  if (obj['$ref']) {
    const parts = obj['$ref'].split('/');
    let resolved = root || SPEC;
    // Navigate: skip first empty string from leading #
    for (let i = 1; i < parts.length; i++) {
      // Handle the tag_groups vs schemas path
      if (parts[i] === 'components') continue;
      resolved = resolved[parts[i]];
      if (!resolved) return { type: 'object', description: obj['$ref'] };
    }
    return resolved;
  }
  return obj;
}

function renderSchemaProps(schema, depth = 0) {
  if (!schema) return '';
  
  // Handle allOf
  if (schema.allOf) {
    let merged = {};
    schema.allOf.forEach(s => {
      const resolved = resolveRef(s, SPEC);
      if (resolved && resolved.properties) {
        Object.assign(merged, resolved.properties);
      }
    });
    schema = { type: 'object', properties: merged, required: schema.required || [] };
  }
  
  const resolved = resolveRef(schema, SPEC);
  if (!resolved || !resolved.properties) return '';
  
  const required = new Set(resolved.required || []);
  const indent = '  '.repeat(depth);
  let lines = [];
  
  for (const [key, prop] of Object.entries(resolved.properties)) {
    const p = resolveRef(prop, SPEC);
    const typeStr = p.enum ? p.enum.map(e => `"${e}"`).join(' | ') :
                    p.type === 'array' ? `array` :
                    p.format ? `${p.type}<${p.format}>` : (p.type || 'object');
    const reqMark = required.has(key) ? ' <span class="req">required</span>' : '';
    const desc = p.description ? `  <span class="desc">// ${escHtml(p.description.split('\n')[0].substring(0, 80))}</span>` : '';
    
    lines.push(`${indent}<span class="key">${escHtml(key)}</span>: <span class="type">${escHtml(typeStr)}</span>${reqMark}${desc}`);
    
    // Recurse one level for nested objects
    if (depth < 1 && p.properties) {
      for (const [sk, sp] of Object.entries(p.properties)) {
        const sr = resolveRef(sp, SPEC);
        const st = sr.type || 'object';
        lines.push(`${indent}  <span class="key">${escHtml(sk)}</span>: <span class="type">${escHtml(st)}</span>`);
      }
    }
  }
  
  return lines.join('\n');
}

function getRefName(schema) {
  if (!schema) return null;
  if (schema['$ref']) {
    const parts = schema['$ref'].split('/');
    return parts[parts.length - 1];
  }
  return null;
}

// ── Build Navigation ──
function buildNav() {
  let html = '';
  const tg = SPEC.tag_groups;
  
  for (const [tagName, group] of Object.entries(tg)) {
    html += `<div class="nav-section" data-tag="${escHtml(tagName)}">`;
    html += `<div class="nav-section-title">${escHtml(tagName)}</div>`;
    
    for (const ep of group.endpoints) {
      const id = `${ep.method}-${ep.path}`.replace(/[^a-zA-Z0-9]/g, '-');
      html += `<a class="nav-item" href="#${id}" data-search="${ep.method} ${ep.path} ${ep.summary}">`;
      html += `<span class="nav-method ${ep.method}">${ep.method}</span>`;
      html += `<span class="nav-path">${escHtml(ep.path)}</span>`;
      html += `</a>`;
    }
    
    html += `</div>`;
  }
  
  document.getElementById('nav').innerHTML = html;
}

// ── Build Main Content ──
function buildMain() {
  const info = SPEC.info;
  let html = '';
  
  // Hero
  html += `<div class="hero">`;
  html += `<h1>OpenDoc Platform API</h1>`;
  html += `<div class="version">v${escHtml(info.version)}</div>`;
  html += `<div class="hero-desc"><p>Healthcare transaction infrastructure. Resolve intent to bounded, pre-priced healthcare transactions. Create, authorize, and settle Health Keys.</p></div>`;
  html += `<div class="hero-servers">`;
  for (const s of SPEC.servers) {
    const cls = s.description.includes('Sandbox') ? 'sandbox' : '';
    html += `<div class="server-badge"><div class="server-dot ${cls}"></div><code>${escHtml(s.url)}</code><span style="color:var(--text3);font-size:12px">${escHtml(s.description)}</span></div>`;
  }
  html += `</div></div>`;
  
  // Invariant banner
  html += `<div class="invariant-banner">`;
  html += `<strong>Cash Price Invariant</strong> — Every price on this platform is a cash price. Every price is final at acceptance. Insurance cannot exist inside the transaction loop. This is not a preference — it is a mathematical necessity proven by contradiction. Platform partners who wish to help patients compare cash-price options against insurance alternatives may do so in their own UIs. OpenDoc does not perform that comparison.`;
  html += `</div>`;
  
  // Stats
  let epCount = 0;
  for (const g of Object.values(SPEC.tag_groups)) epCount += g.endpoints.length;
  html += `<div class="stats-bar">`;
  html += `<div class="stat"><div class="stat-num">${epCount}</div><div class="stat-label">Endpoints</div></div>`;
  html += `<div class="stat"><div class="stat-num">${Object.keys(SPEC.schemas).length}</div><div class="stat-label">Schemas</div></div>`;
  html += `<div class="stat"><div class="stat-num">${Object.keys(SPEC.tag_groups).length}</div><div class="stat-label">Resource Groups</div></div>`;
  html += `<div class="stat"><div class="stat-num">3</div><div class="stat-label">Auth Schemes</div></div>`;
  html += `</div>`;
  
  // Sections by tag
  for (const [tagName, group] of Object.entries(SPEC.tag_groups)) {
    const sectionId = tagName.replace(/[^a-zA-Z0-9]/g, '-');
    html += `<div class="section" id="section-${sectionId}">`;
    html += `<div class="section-title">${escHtml(tagName)}</div>`;
    html += `<div class="section-desc">${escHtml(group.description.trim())}</div>`;
    
    for (const ep of group.endpoints) {
      const id = `${ep.method}-${ep.path}`.replace(/[^a-zA-Z0-9]/g, '-');
      
      html += `<div class="endpoint" id="${id}">`;
      html += `<div class="endpoint-header" onclick="toggleEndpoint(this)">`;
      html += `<span class="method-badge ${ep.method}">${ep.method}</span>`;
      html += `<span class="endpoint-path">${formatPath(ep.path)}</span>`;
      html += `<span class="endpoint-summary">${escHtml(ep.summary)}</span>`;
      
      // Auth badge
      if (ep.security && ep.security.length > 0) {
        const secName = Object.keys(ep.security[0])[0];
        if (secName === 'ProviderAuth') {
          html += `<span class="auth-badge">Provider Auth</span>`;
        }
      }
      
      html += `<span class="endpoint-chevron">▶</span>`;
      html += `</div>`;
      
      html += `<div class="endpoint-body">`;
      
      // Description
      if (ep.description) {
        html += `<div class="endpoint-desc">${escHtml(ep.description.trim())}</div>`;
      }
      
      // Request body
      if (ep.requestBody) {
        html += `<div class="sub-title">Request Body${ep.requestBody.required ? ' (required)' : ''}</div>`;
        const schema = ep.requestBody.schema;
        const refName = getRefName(schema);
        if (refName && SPEC.schemas[refName]) {
          html += `<div style="font-size:12px;color:var(--text3);margin-bottom:4px;font-family:var(--font-mono)">${refName}</div>`;
          html += `<div class="schema-block">${renderSchemaProps(SPEC.schemas[refName])}</div>`;
        } else if (schema && schema.properties) {
          html += `<div class="schema-block">${renderSchemaProps(schema)}</div>`;
        }
      }
      
      // Parameters
      if (ep.parameters && ep.parameters.length > 0) {
        const params = ep.parameters.filter(p => !p['$ref'] || true);
        if (params.length > 0) {
          html += `<div class="sub-title">Parameters</div>`;
          html += `<div class="schema-block">`;
          for (const p of params) {
            const rp = resolveRef(p, SPEC);
            if (rp && rp.name) {
              const inStr = rp.in || 'query';
              const typeStr = rp.schema ? (rp.schema.type || 'string') : 'string';
              const reqStr = rp.required ? ' <span class="req">required</span>' : '';
              html += `<span class="key">${escHtml(rp.name)}</span> <span class="type">(${inStr}, ${typeStr})</span>${reqStr}\n`;
            }
          }
          html += `</div>`;
        }
      }
      
      // Responses
      if (ep.responses) {
        html += `<div class="sub-title">Responses</div>`;
        for (const [code, resp] of Object.entries(ep.responses)) {
          const cls = code.startsWith('2') ? 's2xx' : 's4xx';
          html += `<div class="response-row">`;
          html += `<span class="status-code ${cls}">${code}</span>`;
          html += `<span>${escHtml(resp.description)}`;
          
          if (resp.schema) {
            const rn = getRefName(resp.schema);
            if (rn) {
              html += ` <a href="#schema-${rn}" style="color:var(--green);font-family:var(--font-mono);font-size:12px" onclick="openSchema('${rn}')">${rn}</a>`;
            }
          }
          
          html += `</span></div>`;
        }
      }
      
      html += `</div></div>`;
    }
    
    html += `</div>`;
  }
  
  // Schema Reference Section
  html += `<div class="section" id="section-schemas">`;
  html += `<div class="section-title">Schema Reference</div>`;
  html += `<div class="section-desc">All data models used across the API.</div>`;
  
  for (const [name, schema] of Object.entries(SPEC.schemas)) {
    html += `<div class="schema-card" id="schema-${name}">`;
    html += `<div class="schema-card-header" onclick="toggleSchema(this)">`;
    html += `<span class="schema-name">${escHtml(name)}</span>`;
    
    // Show enum values inline for simple enums
    if (schema.enum && !schema.properties) {
      html += `<span style="font-size:12px;color:var(--text3);font-family:var(--font-mono)">${schema.enum.length} values</span>`;
    } else if (schema.properties) {
      html += `<span style="font-size:12px;color:var(--text3)">${Object.keys(schema.properties).length} fields</span>`;
    }
    
    html += `<span class="endpoint-chevron">▶</span>`;
    html += `</div>`;
    html += `<div class="schema-card-body">`;
    
    if (schema.description) {
      // Check for state machine diagrams
      const desc = schema.description;
      if (desc.includes('→') && desc.includes('```')) {
        const parts = desc.split('```');
        html += `<div class="endpoint-desc">${escHtml(parts[0].trim())}</div>`;
        if (parts[1]) {
          html += `<div class="state-machine">${escHtml(parts[1].trim())}</div>`;
        }
        if (parts[2]) {
          html += `<div class="endpoint-desc">${escHtml(parts[2].trim())}</div>`;
        }
      } else {
        html += `<div class="endpoint-desc">${escHtml(desc.trim())}</div>`;
      }
    }
    
    if (schema.enum && !schema.properties) {
      html += `<div class="schema-block">`;
      for (const v of schema.enum) {
        html += `<span class="enum-val">"${escHtml(v)}"</span>\n`;
      }
      html += `</div>`;
    }
    
    if (schema.properties) {
      html += `<div class="schema-block">${renderSchemaProps(schema)}</div>`;
    }
    
    html += `</div></div>`;
  }
  
  html += `</div>`;
  
  document.getElementById('main').innerHTML = html;
}

// ── Interactions ──
function toggleEndpoint(header) {
  header.parentElement.classList.toggle('open');
}

function toggleSchema(header) {
  header.parentElement.classList.toggle('open');
}

function openSchema(name) {
  const el = document.getElementById('schema-' + name);
  if (el) {
    el.classList.add('open');
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ── Search ──
document.getElementById('search').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(item => {
    const text = item.getAttribute('data-search').toLowerCase();
    item.style.display = !q || text.includes(q) ? '' : 'none';
  });
  document.querySelectorAll('.nav-section').forEach(sec => {
    const visible = sec.querySelectorAll('.nav-item[style=""],.nav-item:not([style])');
    const hasVisible = Array.from(sec.querySelectorAll('.nav-item')).some(i => i.style.display !== 'none');
    sec.style.display = !q || hasVisible ? '' : 'none';
  });
});

// ── Scroll spy ──
function updateActiveNav() {
  const items = document.querySelectorAll('.nav-item');
  const endpoints = document.querySelectorAll('.endpoint');
  let current = null;
  
  endpoints.forEach(ep => {
    const rect = ep.getBoundingClientRect();
    if (rect.top < 200) current = ep.id;
  });
  
  items.forEach(item => {
    const href = item.getAttribute('href');
    item.classList.toggle('active', href === '#' + current);
  });
}

window.addEventListener('scroll', updateActiveNav);

// ── Init ──
buildNav();
buildMain();
</script>
