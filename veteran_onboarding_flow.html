<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenDoc — Veteran DPC Onboarding Flow</title>
<style>
  :root {
    --green: #2D6A4F;
    --green-light: #D4EDDA;
    --green-dark: #155724;
    --red-light: #F8D7DA;
    --red-dark: #721c24;
    --amber-light: #FFF3CD;
    --amber-dark: #856404;
    --blue-light: #CCE5FF;
    --blue-dark: #004085;
    --purple-light: #E2D9F3;
    --purple-dark: #26215C;
    --gray-light: #E2E3E5;
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --text: #333333;
    --text2: #666666;
    --text3: #999999;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.06);
    --radius: 12px;
    --radius-sm: 8px;
    --font: 'Georgia', 'Times New Roman', serif;
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg2: #242424;
      --text: #e0e0e0;
      --text2: #a0a0a0;
      --text3: #707070;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.06);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-ui); background: var(--bg2); color: var(--text); min-height: 100vh; display: flex; justify-content: center; padding: 24px 16px; }

  .container { max-width: 480px; width: 100%; }

  /* ── Veteran card ── */
  .vet-bar { display: flex; gap: 12px; align-items: center; padding: 14px 18px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); margin: 0 0 16px; }
  .vet-av { width: 44px; height: 44px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 15px; color: #fff; flex-shrink: 0; }
  .vet-nm { font-family: var(--font); font-weight: 600; font-size: 15px; color: var(--text); }
  .vet-sb { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* ── Progress bar ── */
  .progress { display: flex; gap: 3px; margin: 0 0 6px; }
  .prog-seg { height: 5px; border-radius: 3px; flex: 1; transition: background 0.4s; }
  .prog-seg.done { background: var(--green); }
  .prog-seg.active { background: var(--green); opacity: 0.55; }
  .prog-seg.future { background: var(--border); }

  .step-info { display: flex; justify-content: space-between; margin: 0 0 16px; font-size: 11px; color: var(--text3); }
  .step-info .cur { color: var(--green); font-weight: 600; }

  /* ── Phone frame ── */
  .phone { width: 320px; margin: 0 auto; background: var(--bg); border: 2.5px solid var(--border); border-radius: 32px; padding: 16px 18px 22px; min-height: 440px; transition: border-color 0.4s; }
  .phone.green { border-color: var(--green); }
  .pnotch { width: 80px; height: 6px; background: var(--border); border-radius: 3px; margin: 0 auto 14px; }

  /* ── Phone content typography ── */
  .phead { font-size: 10px; font-weight: 700; color: var(--green); letter-spacing: 0.8px; text-transform: uppercase; margin: 0 0 12px; text-align: center; }
  .ptitle { font-family: var(--font); font-size: 17px; font-weight: 600; color: var(--text); text-align: center; margin: 0 0 6px; }
  .psub { font-size: 12px; color: var(--text2); text-align: center; line-height: 1.6; margin: 0 0 16px; }

  /* ── VA auth buttons ── */
  .va-btn { display: block; width: 100%; padding: 11px; border-radius: var(--radius-sm); text-align: center; font-size: 13px; font-weight: 600; margin: 7px 0; border: none; cursor: default; letter-spacing: 0.2px; }
  .va-btn.idme { background: #1B8757; color: #fff; }
  .va-btn.logingov { background: #112E51; color: #fff; }
  .va-btn.ds { background: #003E73; color: #fff; }
  .va-btn.mhv { background: #005EA2; color: #fff; }

  /* ── Verification result ── */
  .verify-result { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 16px; margin: 12px 0; font-size: 12px; line-height: 1.8; color: var(--text); }
  .verify-result .lbl { color: var(--text2); }
  .verify-result .val { font-weight: 600; }
  .verify-result .check { color: var(--green-dark); }

  /* ── Tier cards ── */
  .tier-card { border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 16px; margin: 8px 0; cursor: default; transition: all 0.2s; }
  .tier-card.selected { border-color: var(--green); border-width: 2.5px; background: rgba(45,106,79,0.04); }
  .tier-nm { font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--text); }
  .tier-pr { font-size: 13px; color: var(--green); font-weight: 700; }
  .tier-desc { font-size: 11px; color: var(--text2); margin-top: 4px; line-height: 1.5; }
  .tier-badge { display: inline-block; font-size: 10px; padding: 2px 10px; border-radius: 10px; font-weight: 600; margin-left: 6px; vertical-align: middle; }

  /* ── Provider cards ── */
  .prov-card { border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 16px; margin: 8px 0; cursor: default; }
  .prov-card.selected { border-color: var(--green); border-width: 2.5px; }
  .prov-nm { font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--text); }
  .prov-addr { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .prov-dist { font-size: 11px; color: var(--text3); font-weight: 600; }
  .prov-detail { font-size: 11px; color: var(--text2); margin-top: 5px; line-height: 1.5; }

  /* ── Price summary ── */
  .price-box { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 16px; margin: 10px 0; }
  .price-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; color: var(--text); }
  .price-row.total { border-top: 0.5px solid var(--border); margin-top: 6px; padding-top: 8px; font-weight: 600; }
  .grn { color: var(--green-dark); font-weight: 600; }

  /* ── Consent rows ── */
  .consent-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border2); }
  .consent-row:last-child { border-bottom: none; }
  .cbox { width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--border); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; font-weight: 700; }
  .cbox.on { background: var(--green); border-color: var(--green); }
  .clbl { font-size: 12px; color: var(--text); line-height: 1.6; }
  .clbl b { font-weight: 600; }
  .req-tag { font-size: 10px; color: #dc3545; font-weight: 600; }
  .opt-tag { font-size: 10px; color: var(--text3); }
  .c7332 { font-size: 10px; color: var(--amber-dark); background: var(--amber-light); padding: 2px 8px; border-radius: 5px; font-weight: 600; }

  /* ── Health Key final ── */
  .hk-final { text-align: center; }
  .hk-name { font-family: var(--font); font-size: 16px; font-weight: 600; letter-spacing: 1.5px; color: var(--text); }
  .hk-dob { font-size: 11px; color: var(--text2); margin: 3px 0 10px; }
  .hk-prov { font-size: 11px; color: var(--text2); }
  .hk-svc { font-size: 12px; font-weight: 600; color: var(--text); margin: 3px 0 10px; }
  .hk-price { font-family: var(--font); font-size: 34px; font-weight: 700; color: var(--green); padding: 8px 0 2px; }
  .hk-pricelbl { font-size: 10px; color: var(--text2); margin-bottom: 10px; }
  .hk-state { display: inline-block; padding: 6px 24px; border-radius: 8px; font-weight: 600; font-size: 13px; background: var(--green-light); color: var(--green-dark); letter-spacing: 0.5px; }
  .hk-qr { margin: 12px 0 4px; }
  .qr-placeholder { display: inline-block; width: 72px; height: 72px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; }

  /* ── CCO loading ── */
  .cco-bar { height: 5px; background: var(--bg2); border-radius: 3px; margin: 8px 24px; overflow: hidden; }
  .cco-fill { height: 5px; background: var(--green); border-radius: 3px; width: 0%; transition: width 1.8s ease; }
  .cco-domain { display: flex; justify-content: space-between; padding: 4px 0; font-size: 11px; color: var(--text); }
  .cco-domain .ok { color: var(--green-dark); font-weight: 500; }
  .cco-domain .gap { color: var(--amber-dark); font-weight: 500; }

  /* ── Narrator ── */
  .narrator { font-size: 13px; color: var(--text2); line-height: 1.7; padding: 12px 16px; border-left: 3px solid var(--green); background: var(--bg); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; margin: 16px 0 0; }
  .narrator b { color: var(--green); font-weight: 600; }

  /* ── Footnote ── */
  .footnote { font-size: 10px; color: var(--text3); text-align: center; margin-top: 8px; line-height: 1.5; }

  /* ── Navigation ── */
  .nav-row { display: flex; gap: 10px; justify-content: center; margin: 18px 0 0; }
  .nav-row button { font-family: var(--font-ui); font-size: 14px; font-weight: 500; padding: 8px 28px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; transition: all 0.15s; }
  .nav-row button:hover { border-color: var(--green); color: var(--green); }
  .nav-row button:active { transform: scale(0.97); }
  .nav-row button.primary { background: var(--green); color: #fff; border-color: var(--green); }
  .nav-row button.primary:hover { opacity: 0.9; }

  /* ── Responsive ── */
  @media (max-width: 400px) {
    .phone { width: 100%; border-radius: 24px; padding: 12px 14px 18px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="vet-bar">
    <div class="vet-av">JM</div>
    <div>
      <div class="vet-nm">SGT James Martinez, U.S. Army (Ret.)</div>
      <div class="vet-sb">OEF veteran &middot; Canton, Georgia &middot; Enrolled in VA healthcare</div>
    </div>
  </div>

  <div class="progress" id="prog"></div>
  <div class="step-info" id="step-info"></div>
  <div id="screen"></div>

  <div class="nav-row">
    <button onclick="prev()" id="prevbtn">Back</button>
    <button onclick="next()" id="nextbtn" class="primary">Next</button>
  </div>

</div>

<script>
const steps = [
  // ──────────────────────────────────────
  // STEP 0: DISCOVERY
  // ──────────────────────────────────────
  {
    label: "Discovery",
    phone: `
      <div class="phead">OpenDoc</div>
      <div class="ptitle">Healthcare you can see before you buy</div>
      <div class="psub">James sees a flyer at his VA clinic: "Eligible for Direct Primary Care? Get a DPC provider near you &mdash; covered by your VA benefit."</div>
      <div style="background:var(--bg2);border-radius:var(--radius-sm);padding:12px 16px;margin:10px 0;font-size:12px;color:var(--text);line-height:1.7">
        <div style="font-family:var(--font);font-weight:600;margin-bottom:5px">VA Direct Primary Care Pilot</div>
        <div style="color:var(--text2)">Choose a DPC provider near you. Your VHSA covers the membership &mdash; you pay $0. Unlimited primary care visits. Your VA benefits continue for specialty care.</div>
        <div style="margin-top:10px;padding:10px;background:var(--green-light);border-radius:8px;text-align:center;font-weight:600;color:var(--green-dark);font-size:14px;cursor:default">Check my eligibility</div>
      </div>
    `,
    narrator: `<b>What you say:</b> "James sees the pilot at his VA clinic. He could also find it through VA.gov, his VSO, or his PACT team. He taps 'check my eligibility.' No forms. No phone calls. No appointment required."`
  },

  // ──────────────────────────────────────
  // STEP 1: VA IDENTITY
  // ──────────────────────────────────────
  {
    label: "VA identity",
    phone: `
      <div class="phead">Step 1 of 7</div>
      <div class="ptitle">Verify your VA enrollment</div>
      <div class="psub">Sign in with your VA credentials to confirm eligibility</div>
      <div class="va-btn idme">Sign in with ID.me</div>
      <div class="va-btn logingov">Sign in with Login.gov</div>
      <div class="va-btn ds">Sign in with DS Logon</div>
      <div class="va-btn mhv">Sign in with My HealtheVet</div>
      <div class="footnote" style="margin-top:12px">This verifies your identity with the VA through the Lighthouse API.<br>OpenDoc never sees your VA password.</div>
    `,
    narrator: `<b>What you say:</b> "James authenticates with his existing VA credentials. Same login he uses for VA.gov and My HealtheVet. This is OAuth &mdash; OpenDoc never sees his password. The VA confirms his identity and enrollment status through the Lighthouse API. Same mechanism Apple Health uses to pull VA data. No special VA contract required &mdash; patient-directed access under the 21st Century Cures Act."`
  },

  // ──────────────────────────────────────
  // STEP 2: ELIGIBILITY CONFIRMED
  // ──────────────────────────────────────
  {
    label: "Eligibility",
    phone: `
      <div class="phead">Step 2 of 7</div>
      <div class="ptitle">Eligibility confirmed</div>
      <div class="psub">Your VA enrollment qualifies you for the DPC pilot</div>
      <div class="verify-result">
        <div><span class="lbl">Name:</span> <span class="val">James A. Martinez</span></div>
        <div><span class="lbl">DOB:</span> <span class="val">March 14, 1988</span></div>
        <div><span class="lbl">Branch:</span> <span class="val">U.S. Army</span></div>
        <div><span class="lbl">Service era:</span> <span class="val">OEF/OIF</span></div>
        <div><span class="lbl">VA enrolled:</span> <span class="val check">&check; Yes &mdash; Priority Group 3</span></div>
        <div><span class="lbl">SC disability:</span> <span class="val">30% combined</span></div>
        <div><span class="lbl">Combat veteran:</span> <span class="val check">&check; Yes</span></div>
        <div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)"><span class="lbl">Pilot eligible:</span> <span class="val check">&check; Eligible for DPC pilot</span></div>
      </div>
      <div class="footnote">Source: VA Lighthouse Veteran Verification API</div>
    `,
    narrator: `<b>What you say:</b> "Instant. The system pulls his enrollment status, service history, disability rating &mdash; all from the Lighthouse API. He's enrolled, Priority Group 3, 30% service-connected. Eligible. No paperwork. No eligibility determination phone call. The VA already has this data &mdash; OpenDoc just reads it with James's permission."`
  },

  // ──────────────────────────────────────
  // STEP 3: CHOOSE TIER
  // ──────────────────────────────────────
  {
    label: "Choose tier",
    phone: `
      <div class="phead">Step 3 of 7</div>
      <div class="ptitle">Choose your care level</div>
      <div class="psub">Select the plan that matches your healthcare needs</div>
      <div class="tier-card selected">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="tier-nm">Core Primary Care</div>
          <div class="tier-pr">$0/mo</div>
        </div>
        <div class="tier-desc">121 services: adult visits, diabetes management, hypertension, acute care, basic procedures, diagnostics, immunizations, telehealth. Unlimited visits.<span class="tier-badge" style="background:var(--green-light);color:var(--green-dark)">T1</span></div>
      </div>
      <div class="tier-card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="tier-nm">Enhanced Primary Care</div>
          <div class="tier-pr">$0/mo</div>
        </div>
        <div class="tier-desc">245 services: everything in Core plus depression/anxiety therapy (26 sessions/yr), addiction medicine &amp; MAT, psychiatric med management, lab panels.<span class="tier-badge" style="background:var(--blue-light);color:var(--blue-dark)">T2</span></div>
      </div>
      <div class="tier-card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="tier-nm">Comprehensive Primary Care</div>
          <div class="tier-pr">$0/mo</div>
        </div>
        <div class="tier-desc">320 services: everything in Enhanced plus pain management, sports medicine, nutrition counseling, PT coordination, 40 therapy sessions/yr.<span class="tier-badge" style="background:var(--purple-light);color:var(--purple-dark)">T3</span></div>
      </div>
      <div class="footnote">All tiers $0 to veteran. VHSA covers the full membership fee.<br>Change tiers at annual renewal.</div>
    `,
    narrator: `<b>What you say:</b> "Three tiers. Every one is $0 to James &mdash; the VHSA covers the membership. The difference is scope. T1: 121 services &mdash; primary care fundamentals. T2 adds behavioral health and addiction medicine. T3 adds pain management and nutrition. James picks T1 for his diabetes and hypertension. He can upgrade at annual renewal. Every service is enumerated &mdash; not vague categories. Full transparency before he commits."`
  },

  // ──────────────────────────────────────
  // STEP 4: FIND PROVIDER
  // ──────────────────────────────────────
  {
    label: "Find provider",
    phone: `
      <div class="phead">Step 4 of 7</div>
      <div class="ptitle">Find a DPC practice near you</div>
      <div class="psub">Showing T1-capable practices within 20 miles of Canton, GA</div>
      <div class="prov-card selected">
        <div style="display:flex;justify-content:space-between"><div class="prov-nm">Peachtree Direct Primary Care</div><div class="prov-dist">4.2 mi</div></div>
        <div class="prov-addr">215 Riverstone Pkwy, Canton, GA 30114</div>
        <div class="prov-detail">Dr. Sarah Chen, MD &middot; Board-certified FM &middot; Accepting new patients &middot; Same-day visits &middot; Telehealth: yes</div>
      </div>
      <div class="prov-card">
        <div style="display:flex;justify-content:space-between"><div class="prov-nm">North Georgia Family DPC</div><div class="prov-dist">8.7 mi</div></div>
        <div class="prov-addr">402 Hospital Rd, Jasper, GA 30143</div>
        <div class="prov-detail">Dr. Marcus Webb, DO &middot; Board-certified IM &middot; Accepting new patients &middot; Telehealth: yes</div>
      </div>
      <div class="prov-card">
        <div style="display:flex;justify-content:space-between"><div class="prov-nm">Foothills Primary Care Direct</div><div class="prov-dist">11.3 mi</div></div>
        <div class="prov-addr">1180 Lanier Ave W, Cumming, GA 30040</div>
        <div class="prov-detail">Dr. Rachel Torres, MD &middot; Board-certified FM &middot; X-waiver prescriber &middot; T2 capable &middot; Telehealth: yes</div>
      </div>
      <div class="footnote">All providers verified: NPI, state license, DPC model, Health Key integration</div>
    `,
    narrator: `<b>What you say:</b> "DPC practices near Canton, Georgia. Not a marketplace &mdash; no star ratings, no reviews. Verified providers, distance, availability, tier capability. James picks Peachtree &mdash; 4 miles from his house. Eight-minute drive versus 45 minutes to the Atlanta VA."`
  },

  // ──────────────────────────────────────
  // STEP 5: PRICE CONFIRMATION
  // ──────────────────────────────────────
  {
    label: "Price",
    phone: `
      <div class="phead">Step 5 of 7</div>
      <div class="ptitle">Your membership summary</div>
      <div class="psub">Review before you enroll</div>
      <div style="border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;margin:10px 0">
        <div style="font-family:var(--font);font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">Peachtree Direct Primary Care</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:10px">Dr. Sarah Chen, MD &middot; Canton, GA</div>
        <div class="price-box">
          <div class="price-row"><span style="color:var(--text2)">T1 &mdash; Core Primary Care membership</span><span style="font-weight:600">$85/mo</span></div>
          <div class="price-row"><span style="color:var(--text2)">Your VHSA covers</span><span class="grn">&ndash;$85/mo</span></div>
          <div class="price-row total"><span>You pay</span><span class="grn" style="font-size:18px">$0.00/mo</span></div>
        </div>
        <div style="font-size:11px;color:var(--text2);margin-top:10px;line-height:1.6"><b>Included:</b> 121 services &mdash; unlimited visits, telehealth, same-day acute care, chronic disease management, basic procedures, diagnostics, immunizations</div>
        <div style="font-size:11px;color:var(--red-dark);margin-top:6px;line-height:1.6"><b>Stays with VA:</b> PTSD therapy, TBI care, toxic exposure screening, surgical procedures, interventional pain, psychiatric procedures</div>
        <div style="font-size:11px;color:var(--text2);margin-top:6px">Enrollment period: 12 months. Change provider or tier at annual renewal.</div>
      </div>
    `,
    narrator: `<b>What you say:</b> "Before James commits, he sees exactly what he's getting. Price: $85/month. What he pays: $0. What's included: 121 services, enumerated. What stays with VA: also enumerated. Both boundaries visible before he enrolls. This is the transparency moment &mdash; the actual transaction terms, not just quality metrics."`
  },

  // ──────────────────────────────────────
  // STEP 6: CONSENT
  // ──────────────────────────────────────
  {
    label: "Consent",
    phone: `
      <div class="phead">Step 6 of 7</div>
      <div class="ptitle">Share your health records</div>
      <div class="psub">Choose what clinical data to share with your DPC provider</div>
      <div style="margin:10px 0">
        <div class="consent-row">
          <div class="cbox on">&check;</div>
          <div class="clbl"><b>VA identity and enrollment</b> <span class="req-tag">Required</span><br>Name, DOB, service history, enrollment status, disability rating</div>
        </div>
        <div class="consent-row">
          <div class="cbox on">&check;</div>
          <div class="clbl"><b>Medical records</b> <span class="opt-tag">Optional</span><br>Conditions, medications, allergies, lab results, vitals, immunizations, procedures, imaging</div>
        </div>
        <div class="consent-row">
          <div class="cbox on">&check;</div>
          <div class="clbl"><b>Mental health screening scores</b> <span class="opt-tag">Optional</span><br>PHQ-9, GAD-7, PCL-5, C-SSRS scores only &mdash; not therapy notes</div>
        </div>
        <div class="consent-row">
          <div class="cbox"></div>
          <div class="clbl"><b>Protected health information</b> <span class="c7332">38 U.S.C. 7332</span><br>HIV status, sickle cell status, substance use treatment. Each requires separate authorization.<br><span style="font-size:10px;color:var(--text3)">James can add this consent anytime later</span></div>
        </div>
      </div>
      <div class="footnote">You can change or revoke any consent anytime.<br>Your DPC provider sees only what you authorize.</div>
    `,

let idx = 0;

function render() {
  // Progress bar
  const prog = document.getElementById('prog');
  prog.innerHTML = steps.map((_, i) =>
    '<div class="prog-seg ' + (i < idx ? 'done' : i === idx ? 'active' : 'future') + '"></div>'
  ).join('');

  // Step info
  const info = document.getElementById('step-info');
  info.innerHTML = '<span>' + steps[idx].label + '</span><span class="cur">Step ' + (idx + 1) + ' of ' + steps.length + '</span>';

  // Screen
  const screen = document.getElementById('screen');
  const isGreen = steps[idx].green || false;
  screen.innerHTML =
    '<div class="phone' + (isGreen ? ' green' : '') + '">' +
      '<div class="pnotch"></div>' +
      steps[idx].phone +
    '</div>' +
    '<div class="narrator">' + steps[idx].narrator + '</div>';

  // Animate CCO bar
  if (steps[idx].animate) {
    setTimeout(function() {
      var fill = document.getElementById('cco-fill');
      if (fill) fill.style.width = '82%';
    }, 200);
  }

  // Button states
  document.getElementById('prevbtn').style.visibility = idx === 0 ? 'hidden' : 'visible';
  document.getElementById('nextbtn').textContent = idx === steps.length - 1 ? 'Done' : 'Next';
}

function next() {
  if (idx < steps.length - 1) { idx++; render(); window.scrollTo({top: 0, behavior: 'smooth'}); }
}

function prev() {
  if (idx > 0) { idx--; render(); window.scrollTo({top: 0, behavior: 'smooth'}); }
}

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

render();
</script>
